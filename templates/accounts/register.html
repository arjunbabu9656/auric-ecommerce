{% extends 'base.html' %}
{% block title %}Create Account — AURIC{% endblock %}
{% block content %}

<section class="section auth-section">
    <div class="container">
        <div class="auth-box reveal">
            <span class="text-meta">Join the inner circle</span>
            <h1 class="heading-section mt-sm" style="margin-bottom: 2rem;">Create Account</h1>
            
            <form method="post" class="mt-xl">
                {% csrf_token %}
                {% for field in form %}
                <div class="form-group">
                    <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type|default:'text' }}" name="{{ field.name }}" id="{{ field.id_for_label }}" class="form-control" placeholder="{{ field.label }}" value="{{ field.value|default:'' }}">
                    {% if field.errors %}<span class="form-error">{{ field.errors.0 }}</span>{% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn--solid mt-lg" style="width:100%; padding: 1rem;">Create Account</button>
            </form>
            
            <p class="mt-md" style="text-align:center; color: var(--muted); font-size: 0.85rem;">
                Already a member? <a href="{% url 'login' %}" class="nav__link" style="color: var(--dark); border-bottom: 1px solid var(--dark); padding-bottom: 2px;">Sign In</a>
            </p>
        </div>
    </div>
</section>
{% endblock %}
